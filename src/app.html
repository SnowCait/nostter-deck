<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>nostter deck</title>
		<script>
			(() => {
				try {
					const storedValue = localStorage.getItem('nostter:user-settings');
					const theme = storedValue ? JSON.parse(storedValue).theme : 'system';
					const isDark =
						theme === 'dark' ||
						(theme !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);

					document.documentElement.classList.toggle('dark', isDark);
					document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
				} catch {
					// User settings are validated again by the app after startup.
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
