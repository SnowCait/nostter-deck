version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: quarterly
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: quarterly
    cooldown:
      default-days: 7
    groups:
      npm-dependencies:
        patterns:
          - '*'
